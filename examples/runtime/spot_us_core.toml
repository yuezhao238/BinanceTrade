name = "spot-us-core"
description = "A small multi-strategy runtime stack for Binance.US spot, combining BTC and ETH persistent EMA daemons."
notes = [
  "This is the stack-level entrypoint for running multiple supervised daemons in one process.",
  "Each member profile keeps its own state, heartbeat, and restart policy.",
]
profiles = [
  "spot_ema_btcusdt.toml",
  "spot_ema_ethusdt.toml",
]

[settings]
heartbeat_interval_seconds = 30
stale_after_seconds = 90
stop_on_member_exit = true
stop_on_member_failure = true
